#alt_send_esc = true
#background_opacity = 0.9
#dynamic_title = true
#enable_experimental_conpty_backend = true
#tabspaces = 4

[terminal.shell]
program = "/opt/homebrew/bin/bash"
args = ["--login"]

#---------------------------------------------------------------------------
# motoko theme
#---------------------------------------------------------------------------
[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "0x2f4344"
foreground = "0xdbebdc"

#[colors.primary.bright]
#black = "0x9b9b9b"
#blue = "0x8acdd8"
#cyan = "0xb9e5e6"
#green = "0xa6deb8"
#magenta = "0xdebfb0"
#red = "0xd9a48c"
#white = "0xe6e6e6"
#yellow = "0xfbeaac"

#[colors.primary.cursor]
#cursor = "0x69778c"
#text = "0xdbebdc"

#[colors.primary.normal]
#black = "0x878787"
#blue = "0x5e8d94"
#cyan = "0x84a4a4"
#green = "0x849c75"
#magenta = "0x9c857a"
#red = "0x95705f"
#white = "0xe6e6e6"
#yellow = "0xbbaf7f"

[cursor]
style = "Block"
unfocused_hollow = true

[debug]
log_level = "Warn"
persistent_logging = false
print_events = false
#ref_test = false
render_timer = false

[font]
size = 11.0
#use_thin_strokes = true

[font.bold]
style = "Bold"

[font.glyph_offset]
x = 0
y = 0

[font.normal]
family = "GohuFont uni11 Nerd Font Mono"

[font.offset]
x = 0
y = 0

