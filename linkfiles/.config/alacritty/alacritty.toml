#-----------------------------------------------------------------------------
# macos iterm2 shortcuts
#-----------------------------------------------------------------------------
# from https://arslan.io/2018/02/05/gpu-accelerated-terminal-alacritty/

# horizontally split pane
[[keyboard.bindings]]
chars = "\u0002\""
key = "D"
mods = "Command|Shift"

# vertically split pane
[[keyboard.bindings]]
chars = "\u0002%"
key = "D"
mods = "Command"

# kill window
[[keyboard.bindings]]
chars = "\u0002&"
key = "W"
mods = "Command|Shift"

# kill pane
[[keyboard.bindings]]
chars = "\u0002x"
key = "W"
mods = "Command"

# move to pane above
[[keyboard.bindings]]
chars = "\u0002\u001B[A"
key = "K"
mods = "Command"

# move to pane below
[[keyboard.bindings]]
chars = "\u0002\u001B[B"
key = "J"
mods = "Command"

# move to pane on left
[[keyboard.bindings]]
chars = "\u0002\u001B[D"
key = "H"
mods = "Command"

# move to pane on right
[[keyboard.bindings]]
chars = "\u0002\u001B[C"
key = "L"
mods = "Command"

# move to pane above
[[keyboard.bindings]]
chars = "\u0002\u001B[A"
key = "Up"
mods = "Command"

# move to pane below
[[keyboard.bindings]]
chars = "\u0002\u001B[B"
key = "Down"
mods = "Command"

# move to pane on left
[[keyboard.bindings]]
chars = "\u0002\u001B[D"
key = "Left"
mods = "Command"

# move to pane on right
[[keyboard.bindings]]
chars = "\u0002\u001B[C"
key = "Right"
mods = "Command"

# new window
[[keyboard.bindings]]
chars = "\u0002c"
key = "T"
mods = "Command"

# select window 1
[[keyboard.bindings]]
chars = "\u00021"
key = "Key1"
mods = "Command"

# select window 2
[[keyboard.bindings]]
chars = "\u00022"
key = "Key2"
mods = "Command"

# select window 3
[[keyboard.bindings]]
chars = "\u00023"
key = "Key3"
mods = "Command"

# select window 4
[[keyboard.bindings]]
chars = "\u00024"
key = "Key4"
mods = "Command"

# select window 5
[[keyboard.bindings]]
chars = "\u00025"
key = "Key5"
mods = "Command"

# select window 6
[[keyboard.bindings]]
chars = "\u00026"
key = "Key6"
mods = "Command"

# select window 7
[[keyboard.bindings]]
chars = "\u00027"
key = "Key7"
mods = "Command"

# select window 8
[[keyboard.bindings]]
chars = "\u00028"
key = "Key8"
mods = "Command"

# select window 9
[[keyboard.bindings]]
chars = "\u00029"
key = "Key9"
mods = "Command"

# select window 0
[[keyboard.bindings]]
chars = "\u00020"
key = "Key0"
mods = "Command"

# previous window
# key is "{" / "}" (post-shift) not "[" / "]" or LBracket/RBracket: since
# alacritty 0.13 the macOS binding matcher sees the shifted character.
# https://github.com/alacritty/alacritty/issues/7698
[[keyboard.bindings]]
chars = "\u0002p"
key = "{"
mods = "Command|Shift"

# next window
[[keyboard.bindings]]
chars = "\u0002n"
key = "}"
mods = "Command|Shift"

[[keyboard.bindings]]
chars = """
\u001B0Diback
"""
key = "LBracket"
mods = "Command"

[[keyboard.bindings]]
chars = """
\u001B0Difwd
"""
key = "RBracket"
mods = "Command"

# enter copy mode
[[keyboard.bindings]]
chars = "\u0002["
key = "Escape"
mods = "Command"

# rename window
[[keyboard.bindings]]
chars = "\u0002,"
key = "I"
mods = "Command"

#-----------------------------------------------------------------------------
# macos open new window
#-----------------------------------------------------------------------------
# https://github.com/jwilm/alacritty/issues/607
[[keyboard.bindings]]
key = "N"
mods = "Command"

[keyboard.bindings.command]
args = ["-n", "/Applications/Alacritty.app"]
program = "open"

#-----------------------------------------------------------------------------
# use alt-tab and alt-shift-tab in vim
#-----------------------------------------------------------------------------
[[keyboard.bindings]]
chars = """
\u001B:tabn
"""
key = "Tab"
mods = "Alt"

[[keyboard.bindings]]
chars = """
\u001B:tabp
"""
key = "Tab"
mods = "Alt|Shift"

[general]
live_config_reload = true
working_directory = "None"

[mouse]
hide_when_typing = false

#[mouse.double_click]
#threshold = 300

#[mouse.triple_click]
#threshold = 300

#[mouse.url]
#modifiers = "Command"

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[scrolling]
#auto_scroll = false
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true
semantic_escape_chars = """,│`|:"' ()[]{}<>"""

#[visual_bell]
#animation = "EaseOutExpo"
#color = "0xffffff"
#duration = 0

[window]
decorations = "buttonless"
dynamic_padding = false
startup_mode = "Windowed"
option_as_alt = "OnlyLeft"

[window.dimensions]
columns = 90
lines = 65

[window.padding]
x = 0
y = 0

[window.position]
x = 200
y = 50

